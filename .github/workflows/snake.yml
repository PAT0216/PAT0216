name: generate animation

on:
  # Run automatically every 24 hours at midnight UTC
  schedule:
    - cron: "0 0 * * *" 
  
  # Allows you to manually run the job from the Actions tab at any time
  workflow_dispatch:
  
  # Run on every push to the main branch
  push:
    branches:
      - main
      
jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Generates the snake SVGs from the contribution graph of the repository owner
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/github-contribution-grid-snake-ocean.svg?palette=github-dark&color_snake=orange&color_dots=#bfd6f6,#8dbdff,#64a1f4,#4682b4,#11558c

      # Pushes the generated SVGs in the 'dist' directory to a clean 'output' branch
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
